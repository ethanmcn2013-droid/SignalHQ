<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Signal HQ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        obsidian: '#0A0A0A',
                        intelligence: '#4F46E5',
                        'intelligence-light': '#818cf8',
                    }
                }
            }
        }
    </script>
    <style>
        .bg-grid-dark {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
        
        /* Ensures the Clerk component centers perfectly in our layout */
        .clerk-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="bg-white dark:bg-[#0A0A0A] text-gray-900 dark:text-white min-h-screen flex flex-col md:flex-row antialiased selection:bg-intelligence selection:text-white">

    <!-- Left Panel: Brand Visual (Always Dark Mode aesthetic) -->
    <div class="hidden md:flex md:w-1/2 lg:w-[45%] bg-[#0A0A0A] relative flex-col justify-between p-12 overflow-hidden border-r border-gray-800">
        <div class="absolute inset-0 bg-grid-dark z-0"></div>
        <div class="absolute top-[-20%] left-[-20%] w-[80%] h-[80%] bg-intelligence rounded-full filter blur-[150px] opacity-20 pointer-events-none"></div>

        <div class="relative z-10">
            <a href="index.html" class="flex items-center text-white no-underline w-max">
                <span class="font-bold text-2xl tracking-tight">Signal<span class="font-light ml-1">HQ</span></span>
                <span class="inline-block w-2.5 h-2.5 bg-intelligence-light rounded-full ml-2 shadow-[0_0_12px_rgba(129,140,248,0.8)]"></span>
            </a>
        </div>

        <div class="relative z-10 w-full flex justify-center py-20 pointer-events-none">
            <!-- Animated Node Graphic -->
            <svg width="400" height="400" viewBox="0 0 800 800" class="stroke-white/20 animate-[spin_120s_linear_infinite]" fill="none">
                <circle cx="400" cy="400" r="300" stroke-width="2" stroke-dasharray="4 12" />
                <circle cx="400" cy="400" r="200" stroke-width="2" />
                <circle cx="400" cy="400" r="100" stroke-width="2" stroke-dasharray="2 6" />
                <circle cx="400" cy="100" r="8" fill="#818cf8" />
                <circle cx="612" cy="188" r="5" fill="#ffffff" />
                <circle cx="700" cy="400" r="8" fill="#818cf8" />
                <line x1="400" y1="100" x2="612" y2="188" stroke-width="1.5" />
                <line x1="612" y1="188" x2="700" y2="400" stroke-width="1.5" />
            </svg>
        </div>

        <div class="relative z-10">
            <h2 class="text-3xl text-white font-medium tracking-tight mb-3">Systematise your thinking.</h2>
            <p class="text-gray-400 font-light text-sm max-w-sm">Log in to access the shared board, map workflows, and automate your operations for free.</p>
        </div>
    </div>

    <!-- Right Panel: Authentication Area -->
    <div class="w-full md:w-1/2 lg:w-[55%] flex flex-col justify-center items-center p-8 lg:p-24 relative bg-white dark:bg-obsidian transition-colors duration-300">
        
        <!-- Mobile Logo -->
        <div class="md:hidden absolute top-8 left-8">
            <a href="index.html" class="flex items-center no-underline">
                <span class="font-bold text-xl tracking-tight text-gray-900 dark:text-white">Signal<span class="font-light ml-1">HQ</span></span>
                <span class="inline-block w-2 h-2 bg-intelligence rounded-full ml-1.5 shadow-[0_0_8px_rgba(79,70,229,0.8)]"></span>
            </a>
        </div>

        <button onclick="document.documentElement.classList.toggle('dark')" class="absolute top-8 right-8 p-2 rounded-full border border-gray-200 dark:border-gray-800 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-900 transition-colors">
            <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
            <i data-lucide="sun" class="w-4 h-4 block dark:hidden"></i>
        </button>

        <div class="w-full max-w-md flex flex-col items-center">
            
            <!-- This is where Clerk will inject the beautiful Auth UI -->
            <div id="sign-in-container" class="clerk-wrapper">
                <!-- Fallback loading state while Clerk initializes -->
                <div class="animate-pulse flex flex-col items-center">
                    <div class="w-8 h-8 border-4 border-intelligence border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Loading secure environment...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Clerk Authentication Script -->
    <script>
        // Your actual publishable key
        const clerkPublishableKey = "pk_test_c3VidGxlLWZpbmNoLTIyLmNsZXJrLmFjY291bnRzLmRldiQ";
      
        const startClerk = async () => {
          const Clerk = window.Clerk;
          try {
            await Clerk.load();
            
            const signInContainer = document.getElementById('sign-in-container');
            
            // Clear the loading spinner
            signInContainer.innerHTML = '';
      
            if (Clerk.user) {
              // If they are already logged in, redirect them to the app!
              window.location.href = 'board.html'; 
            } else {
              // If not logged in, mount the Sign In component
              Clerk.mountSignIn(signInContainer, {
                routing: 'hash',
                afterSignInUrl: 'board.html',
                afterSignUpUrl: 'board.html',
                appearance: {
                  variables: {
                    colorPrimary: '#4F46E5', // Matches your "intelligence" purple
                    colorText: '#111827',
                  },
                  elements: {
                    card: 'shadow-xl rounded-2xl border border-gray-200/50',
                  }
                }
              });
            }
          } catch (err) {
            console.error('Error starting Clerk: ', err);
            document.getElementById('sign-in-container').innerHTML = '<p class="text-red-500">Failed to load authentication. Please refresh.</p>';
          }
        };
      
        // Dynamically load the Clerk script
        const script = document.createElement('script');
        script.setAttribute('data-clerk-publishable-key', clerkPublishableKey);
        script.async = true;
        script.src = `https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js`;
        script.crossOrigin = 'anonymous';
        script.addEventListener('load', startClerk);
        document.body.appendChild(script);
        
        lucide.createIcons();
    </script>
</body>
</html>
