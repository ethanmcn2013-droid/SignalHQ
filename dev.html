<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Hub | SignalHQ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A subtle animated grid background for that "dev" feel */
        body {
            background-color: #0f172a;
            background-image: linear-gradient(to right, #1e293b 1px, transparent 1px),
                              linear-gradient(to bottom, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- Header -->
        <div class="flex items-center justify-between border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <span class="text-indigo-500">⚡</span> SignalHQ Dev Menu
                </h1>
                <p class="text-slate-400 mt-1 text-sm">Internal navigation hub. Do not deploy to production.</p>
            </div>
            <div class="text-xs font-mono bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-slate-700">
                development_mode: true
            </div>
        </div>

        <!-- 1. Quick Dropdown Section -->
        <div class="bg-slate-800/80 backdrop-blur-sm p-6 rounded-xl border border-slate-700 shadow-xl">
            <label for="pageSelect" class="block text-sm font-medium text-slate-300 mb-3">Fast Jump to Page</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <select id="pageSelect" class="flex-1 bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow font-mono text-sm appearance-none">
                    <!-- Populated by JS -->
                </select>
                <div class="flex gap-2">
                    <button onclick="openSelected('_self')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-lg font-medium transition-colors shadow-lg shadow-indigo-500/20 w-full sm:w-auto">
                        Open Here
                    </button>
                    <button onclick="openSelected('_blank')" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg transition-colors border border-slate-600" title="Open in new tab">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. Grid Links Section -->
        <div id="gridContainer" class="space-y-8">
            <!-- Categories populated by JS -->
        </div>

    </div>

    <script>
        // Organized based on the files in your Github screenshot
        const sitemap = [
            {
                category: "Core Application",
                color: "text-blue-400",
                pages: [
                    { name: "Home (Index)", url: "index.html", icon: "🏠" },
                    { name: "Authentication", url: "auth.html", icon: "🔐" },
                ]
            },
            {
                category: "The Suite (Products)",
                color: "text-indigo-400",
                pages: [
                    { name: "Signal Plan", url: "plan.html", icon: "📅" },
                    { name: "Signal Map", url: "map demo.html", icon: "🗺️" },
                    { name: "Signal Board", url: "board.html", icon: "📋" },
                    { name: "Signal Automate", url: "automate.html", icon: "⚡" },
                ]
            },
            {
                category: "Marketing & Services",
                color: "text-emerald-400",
                pages: [
                    { name: "Services", url: "services.html", icon: "🛠️" },
                    { name: "Strategy Call", url: "strategy_call.html", icon: "📞" },
                ]
            },
            {
                category: "Demos & Assets",
                color: "text-amber-400",
                pages: [
                    { name: "Main Demo", url: "demo.html", icon: "▶️" },
                    { name: "Canvas Demo", url: "canvas_demo.html", icon: "🎨" },
                    { name: "Tasks Demo", url: "tasks demo.html", icon: "✅" },
                    { name: "Icon Asset Studio", url: "99_icon_asset_studio.html", icon: "📦" },
                    { name: "SaaS Growth UI Pack", url: "99_SaaS_growth_ui_pack.html", icon: "✨" },
                ]
            }
        ];

        const select = document.getElementById('pageSelect');
        const gridContainer = document.getElementById('gridContainer');

        sitemap.forEach(group => {
            // 1. Populate Dropdown Options
            const optgroup = document.createElement('optgroup');
            optgroup.label = group.category;
            
            group.pages.forEach(page => {
                const option = document.createElement('option');
                option.value = page.url;
                option.textContent = `${page.icon} ${page.name} (${page.url})`;
                optgroup.appendChild(option);
            });
            select.appendChild(optgroup);

            // 2. Populate Grid Links
            const section = document.createElement('div');
            
            const title = document.createElement('h2');
            title.className = `text-sm font-bold uppercase tracking-wider mb-4 ${group.color}`;
            title.textContent = group.category;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4";

            group.pages.forEach(page => {
                const a = document.createElement('a');
                a.href = page.url;
                a.className = "group bg-slate-800/80 backdrop-blur-sm border border-slate-700 hover:border-indigo-500 hover:bg-slate-800 p-4 rounded-xl text-slate-300 hover:text-white transition-all duration-200 flex flex-col justify-between h-full shadow-sm hover:shadow-md hover:-translate-y-0.5";
                
                a.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xl">${page.icon}</span>
                        <svg class="opacity-0 group-hover:opacity-100 transition-opacity text-indigo-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </div>
                    <div>
                        <div class="font-medium text-sm">${page.name}</div>
                        <div class="text-xs text-slate-500 font-mono mt-1">${page.url}</div>
                    </div>
                `;
                grid.appendChild(a);
            });

            section.appendChild(grid);
            gridContainer.appendChild(section);
        });

        // Function to handle dropdown navigation
        function openSelected(target) {
            const url = select.value;
            if (url) {
                window.open(url, target);
            }
        }
    </script>
</body>
</html>
